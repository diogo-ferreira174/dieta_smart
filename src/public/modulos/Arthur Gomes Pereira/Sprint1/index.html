<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
<link rel="stylesheet" href="style.css">

<body>
    <div class="container">
        <h1>Cadastro</h1>

        <form id="formulario">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label>Email</label>
            <input type="email" id="email" placeholder="   Ex: email@gmail.com">

            <label>Senha</label>
            <input type="password" id="senha" placeholder="   Digite sua senha">

            <label>Idade</label>
            <input type="number" id="idade" placeholder="   Insira sua idade">

            <label>Altura</label>
            <input type="number" id="altura" placeholder="   Ex: 1,75" step="0.01">

            <label>Peso</label>
            <input type="number" id="peso" placeholder="   Ex: 73">

            <label>Frequência de atividades físicas</label>
            <select id="frequencia">
                <option>Nunca</option>
                <option>As vezes</option>
                <option>Frequentemente</option>
            </select>
        <br><br>
        <div class="botao">
            <button type="submit">Cadastrar</button>
               </form> 
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
