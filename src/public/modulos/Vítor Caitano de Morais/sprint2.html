<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montagem de rotina</title>
    <link rel="stylesheet" href="sprint2.css">
</head>
<body>
    <h3>Escolha exercícios e monte sua rotina personalizada!</h3>

    <p>Quantos exercícios você pretende fazer durante o dia? (Apenas dígitos numéricos no campo)</p>
    <input type="text" id="qtdExercicios">
    <button id="comeco">Enter</button>

    <br><br>

    <div id="telaPrincipal">
        <div id="areaSeletores"></div>
        <br>
        <div id="soma"></div>
        <br>
        <button id="cadastro">Concluir dieta</button>
        <button id="modificar">Ver rotinas prontas</button>
    </div>

    <script src="sprint2.js"></script>
</body>
</html>
