<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div style="width: 100%; display: flex; justify-content:center;">
            <img id="logo" src="assets/images/logo-maca.png" alt="logo.png">
        </div>
    </header>
    <main>
        <div id="organizador">
            <div class="arthur">
                <h1>Cadastro de Informações</h1>

                <form id="formulario">
                    <label>Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">

                    <label>Idade</label>
                    <input type="number" id="idade" placeholder="Insira sua idade">

                    <label>Sexo</label>
                    <select id="informeSexo">
                        <option value="M">Homem</option>
                        <option value="F">Mulher</option>
                    </select>

                    <label>Altura</label>
                    <input type="number" id="altura" placeholder="Ex: 175">

                    <label>Peso</label>
                    <input type="number" id="peso" placeholder="Ex: 73">

                    <label>Frequência de atividades físicas</label>
                    <select id="frequencia">
                        <option value="1.2">Nunca (sedentário)</option>
                        <option value="1.375">As vezes (levemente ativo)</option>
                        <option value="1.55">Frequentemente (moderadamente ativo)</option>
                        <option value="1.9">Esportivamente (extremamente ativo)</option>
                    </select>
                    <br><br>
                    <div class="botao">
                        <button type="submit">Cadastrar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <h2>DietaSmart™</h2>
        <h4>Site por:</h4>
        <ul>
            <li>Arthur</li>
            <li>Diogo</li>
            <li>Enzo</li>
            <li>Gabriel</li>
            <li>Leandro</li>
            <li>Oliveiros</li>
            <li>Pedro</li>
            <li>Vítor</li>
        </ul>
    </footer>

    <script src="assets/js/cadastro.js"></script>
</body>
</html>
