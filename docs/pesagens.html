        <div id="menuLateral">

    <main>

        <div class="container">

            <div class="menu">

                <p class="titulo">Desempenho acompanhado</p>

                <!-- CADASTRO DE PESAGEM -->
                <div class="container2">

                    <p class="titulo">Nova Pesagem</p>

                    <div class="formulario">

                        <!-- DATA (FUNCIONA EM 100% DOS NAVEGADORES) -->
                        <input type="date" id="data">

                        <input
                            type="number"
                            id="peso"
                            placeholder="Peso (kg)"
                            step="0.1">

                        <button id="btnAdicionarPesagem" type="button">
                            Adicionar
                        </button>

                    </div>

                    <p id="mensagemPesagem" class="mensagem-pesagem" aria-live="polite"></p>

                </div>

                <!-- HISTÓRICO -->
                <div class="container2">

                    <p class="titulo">Histórico de Pesagens</p>

                    <ul class="pesagens-info" id="listaPesagens"></ul>

                </div>

            </div>

            <!-- GRÁFICO -->
            <div class="grafico">
                <canvas id="graficolinha" width="500" height="500"></canvas>
            </div>
